syntax = "proto3";

package contextunity.brain;

import "contextunit.proto";

// =====================================================
// Brain Service - Universal Knowledge Operations
// =====================================================
// All methods use ContextUnit as input/output.
// Domain-specific data is passed via payload field.
//
// SPOT: Tenant identity is carried by ``ContextToken`` metadata — never
// by in-band payload. Legacy ``tenant_id`` fields in payloads are
// accepted for backward compatibility but MUST be consistent with the
// token's ``allowed_tenants`` or the request is rejected with
// PERMISSION_DENIED. New callers SHOULD omit ``tenant_id`` from payload
// and rely on the token.
// =====================================================

service BrainService {
    // =========================================
    // Core Knowledge Operations
    // =========================================

    // Semantic/Hybrid search
    // Request payload: {tenant_id, query_text, limit?, source_types?}
    // Response payload: {id, content, score, source_type, metadata}
    rpc Search(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // Graph Traversal
    // Request payload: {tenant_id, entrypoint_ids, max_hops?, allowed_relations?}
    // Response payload: {nodes: [...], edges: [...]}
    rpc GraphSearch(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Create Knowledge Graph relation
    // Request payload: {tenant_id, source_type, source_id, relation, target_type, target_id}
    // Response payload: {success}
    rpc CreateKGRelation(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Upsert content (generic)
    // Request payload: {tenant_id, content, source_type, metadata?}
    // Response payload: {id, success}
    rpc Upsert(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Query memory (hybrid search with provenance)
    // Request payload: {tenant_id, content, filters?}
    // Response payload: {content, metadata, score}
    rpc QueryMemory(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // =========================================
    // NewsEngine Operations
    // =========================================


    // =========================================
    // Episodic & Entity Memory
    // =========================================

    // Add conversation episode
    // Request payload: {user_id, tenant_id, session_id?, content, metadata?}
    rpc AddEpisode(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get recent episodes for a user
    // Request payload: {tenant_id, user_id, limit?}
    // Response payload: {id, content, metadata, created_at}
    rpc GetRecentEpisodes(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // Upsert user fact
    // Request payload: {user_id, tenant_id, key, value, confidence?, source_id?}
    rpc UpsertFact(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get all facts for a user
    // Request payload: {tenant_id, user_id}
    // Response payload: {fact_key, fact_value, confidence, updated_at}
    rpc GetUserFacts(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // Get episode count and date range for a tenant
    // Request payload: {tenant_id}
    // Response payload: {total, oldest, newest, tenant_id}
    rpc GetEpisodeStats(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Delete old episodes for a tenant, optionally restricted to explicit IDs
    // Request payload: {tenant_id, older_than_days, episode_ids?}
    // Response payload: {deleted_count}
    rpc RetentionCleanup(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // Agent Traces
    // =========================================

    // Log an agent execution trace
    // Request payload: {tenant_id, agent_id, session_id?, graph_name?,
    //   tool_calls?, token_usage?, timing_ms?, security_flags?, metadata?}
    // Response payload: {id, success}
    rpc LogTrace(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get traces (admin/observability)
    // Request payload: {tenant_id, agent_id?, session_id?, limit?, since?}
    // Response payload: {id, agent_id, graph_name, tool_calls, token_usage,
    //   timing_ms, security_flags, metadata, created_at}
    rpc GetTraces(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // =========================================
    // Taxonomy Operations
    // =========================================

    // Upsert taxonomy entry
    // Request payload: {tenant_id, domain, name, path, keywords?, metadata?}
    rpc UpsertTaxonomy(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get taxonomy entries
    // Request payload: {tenant_id, domain?}
    // Response payload: {domain, name, path, keywords, metadata}
    rpc GetTaxonomy(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // =========================================
    // Blackboard Operations (Flat Memory)
    // =========================================

    // Write arbitrary data to the blackboard, return UUID
    // Request payload: {tenant_id, scope_path, content, metadata?, ttl_seconds?, created_by?}
    // Response payload: {id, scope_path, created_at}
    rpc WriteBlackboard(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Read one or more records by UUID(s) — STRICTLY BATCHED
    // Request payload: {ids: [UUID, ...]}
    // Response payload: {records: [{id, content, metadata, scope_path, created_at}]}
    rpc ReadBlackboard(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // BrainSynapse Operations (Flat Memory Phase B)
    // =========================================

    // Record a BrainSynapse learning trace.
    // Request payload: {tenant_id?, agent_id, action_type, action_data?, action_data_ref?,
    //   thought_trace_ref?, content_hash?, graph_name?, graph_run_id?, node_id?, node_name?,
    //   node_role?, scope_path?, context_summary?, client_id?, fault_class?, status?,
    //   q_action?, q_hypothesis?, q_relevance?, metadata?}
    // Response payload: {id, agent_id, action_type, node_role, status, q_action,
    //   q_hypothesis, q_relevance, q_composite, scope_path, metadata, created_at, updated_at}
    rpc RecordSynapse(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Query BrainSynapses, ranked by q_composite and bounded by limit.
    // Request payload: {tenant_id?, action_type?, agent_id?, node_role?, status?,
    //   scope_path?, min_q?, limit?}
    // Response payload stream: one ContextUnit per Synapse row, same shape as RecordSynapse's
    //   response plus {graph_name, graph_run_id, node_id, node_name, action_data,
    //   action_data_ref, context_summary, thought_trace_ref, content_hash, fault_class}
    rpc QuerySynapses(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // Update Q-values/fault/status on one tenant-owned Synapse after an outcome/review.
    // Request payload: {synapse_id, q_action?, q_hypothesis?, q_relevance?, fault_class?,
    //   status?, metadata_patch?}
    // Response payload: {id, q_action, q_hypothesis, q_relevance, q_composite, updated_at}
    rpc UpdateSynapseQ(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // DuckDB Operations
    // =========================================

    // Execute high-speed DuckDB string/fuzzy matching on Parquet files
    // Request payload: {tenant_id, unmatched_uri, canonical_uri}
    // Response payload: {duckdb_matches: [...], duckdb_leftovers_count: int}
    rpc MatchDuckDB(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // Admin RPCs (WS-8) — require admin:read
    // Cross-tenant observability owned by Brain.
    // Replaces View brain_db RLS bypass (S8).
    // =========================================

    // List all tenants the caller may administer.
    // Requires admin:read.
    // Token admin:all → all tenants; else intersection with allowed_tenants.
    // Request payload: {}
    // Response payload: {tenants: [{id, label?, trace_count?}]}
    rpc ListTenants(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Cross-tenant trace search.
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {tenant_id?, service?, agent_id?, status?, hours?, limit?, offset?}
    // Response payload: {traces: [...], total: int}
    rpc AdminSearchTraces(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get full details for a single trace (cross-tenant, admin-only).
    // Requires admin:read.
    // Request payload: {trace_id}
    // Response payload: same shape as GetTraces row
    rpc AdminGetTraceDetails(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Cross-tenant system analytics aggregates.
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {hours?, tenant_id?}
    // Response payload: {analytics: {...}}
    rpc AdminGetSystemAnalytics(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Cross-tenant memory layer stats (episodes, knowledge node counts).
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {layer?, tenant_id?}
    // Response payload: {layer_stats: {...}}
    rpc AdminGetMemoryLayerStats(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Distinct filter values from agent_traces (for admin UI dropdowns).
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {tenant_id?}
    // Response payload: {filter_options: {agent_ids, tenant_ids, graph_names, user_ids}}
    rpc AdminGetFilterOptions(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Fetch all traces for a given session_id (cross-tenant, admin-only).
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {session_id, tenant_id?}
    // Response payload: {traces: [...]}
    rpc AdminGetSessionTraces(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Fetch episodic_events related to a trace by trace_id (cross-tenant).
    // Requires admin:read.
    // Tenant scope is resolved from the trace's own tenant_id (by-id lookup).
    // Request payload: {trace_id}
    // Response payload: {episodes: [...]}
    rpc AdminGetRelatedEpisodes(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Cross-tenant episodic event search with pagination.
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {tenant_id?, user_id?, session_id?, hours?, limit?, offset?}
    // Response payload: {events: [...], total: int}
    rpc AdminSearchEpisodes(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // List cells with optional tenant/kind filter (cross-tenant).
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {tenant_id?, kind?, limit?}
    // Response payload: {nodes: [...]}
    rpc AdminGetCells(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Rich analytics summary with per-hour breakdown, token costs, tool usage.
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {tenant_id?, hours?}
    // Response payload: {analytics: {...}}
    rpc AdminGetAnalyticsSummary(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
}
