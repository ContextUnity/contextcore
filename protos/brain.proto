syntax = "proto3";

package contextunity.brain;

import "contextunit.proto";

// =====================================================
// Brain Service - Universal Knowledge Operations
// =====================================================
// All methods use ContextUnit as input/output.
// Domain-specific data is passed via payload field.
//
// SPOT: Tenant identity is carried by ``ContextToken`` metadata — never
// by in-band payload. Legacy ``tenant_id`` fields in payloads are
// accepted for backward compatibility but MUST be consistent with the
// token's ``allowed_tenants`` or the request is rejected with
// PERMISSION_DENIED. New callers SHOULD omit ``tenant_id`` from payload
// and rely on the token.
// =====================================================

service BrainService {
    // =========================================
    // Core Knowledge Operations
    // =========================================

    // Canonical BrainCell semantic/hybrid search.
    // Request payload: {tenant_id?, query_text, limit?, min_score?, source_types?, scope_path?, user_id?}
    // Response payload: {id, tenant_id, cell_kind, content, score, vector_score?, text_score?, source_type, source_ref?, scope_path?, content_hash?, confidence, visibility, metadata}
    rpc SearchCells(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // Graph Traversal
    // Request payload: {tenant_id, entrypoint_ids, max_hops?, allowed_relations?}
    // Response payload: {nodes: [...], edges: [...]}
    rpc GraphSearch(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Create Knowledge Graph relation
    // Request payload: {tenant_id, source_type, source_id, relation, target_type, target_id}
    // Response payload: {success}
    rpc CreateKGRelation(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Explicit document ingestion with enrichment/chunking semantics.
    // Request payload: {tenant_id?, content, source_type, metadata?, user_id?}
    // Response payload: {id, success}
    rpc IngestDocument(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Phase 3: Canonical BrainCell API
    // Upsert a canonical BrainCell over current knowledge storage.
    // Request payload: {tenant_id?, cell_id?, cell_kind, content, metadata?, scope_path?,
    //   content_hash?, source_type?, source_ref?, confidence?, visibility?, user_id?}
    // Response payload: {id, tenant_id, cell_kind, source_type, scope_path, content_hash, confidence, visibility, created_at, updated_at}
    rpc UpsertCell(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Query canonical BrainCells by text/scope/source/metadata.
    // Request payload: {tenant_id?, query_text?, cell_kind?, source_type?, scope_path?,
    //   metadata_filter?, limit?, user_id?}
    // Response payload stream: {id, tenant_id, cell_kind, content, metadata, score?, source_type, source_ref, scope_path, content_hash, confidence, visibility}
    rpc QueryCells(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // Get one BrainCell by id.
    // Request payload: {tenant_id?, cell_id}
    // Response payload: {id, tenant_id, cell_kind, content, metadata, source_type, source_ref, scope_path, content_hash, confidence, visibility, created_at, updated_at}
    rpc GetCell(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Atomically delete bounded, exact documentation cells only when every
    // supplied id/content_hash target still matches in the resolved tenant.
    // Request payload: {tenant_id?, targets:[{cell_id, content_hash}]}
    // Response payload: {status: deleted|conflict, deleted_count, expected_count}
    rpc DeleteDocumentationCells(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Durable asynchronous embedding enrichment. Payloads contain references
    // and status only; Brain keeps cell text/provider calls internal.
    rpc EnqueueCellEmbedding(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    rpc ClaimCellEmbeddingJobs(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    rpc EmbedClaimedCell(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    rpc FailCellEmbeddingJob(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    rpc GetCellEmbeddingStatus(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    // Cheap gate/storage readiness preflight. Does not load or call the provider.
    rpc GetEmbeddingCapability(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // NewsEngine Operations
    // =========================================


    // =========================================
    // Conversation History
    // =========================================

    // Append one immutable conversation record with canonical hashes and idempotency.
    rpc AppendConversationRecord(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Run one bounded recent/older/session/trace-related projection.
    rpc QueryConversationHistory(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // Return content-free tenant statistics.
    rpc GetConversationHistoryStats(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Apply explicit, evidence-backed Conversation History retention.
    rpc ApplyConversationRetention(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Apply age-based terminal Execution Trace retention.
    rpc ApplyExecutionTraceRetention(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // Agent Traces
    // =========================================

    // Log an agent execution trace
    // Request payload: {tenant_id, agent_id, session_id?, graph_name?,
    //   tool_calls?, token_usage?, timing_ms?, security_flags?, metadata?}
    // Response payload: {id, success}
    rpc LogTrace(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get traces (admin/observability)
    // Request payload: {tenant_id, agent_id?, session_id?, limit?, since?}
    // Response payload: {id, agent_id, graph_name, tool_calls, token_usage,
    //   timing_ms, security_flags, metadata, created_at}
    rpc GetTraces(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // Protected per-provider-attempt model-I/O artifact lifecycle. Payloads are
    // closed ContextUnit contracts; immutable Trace JSON stores refs only.
    rpc ReserveExecutionTraceArtifact(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    rpc FinalizeExecutionTraceArtifact(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    rpc GetExecutionTraceArtifact(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    rpc ArchiveExecutionTraceArtifact(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    rpc RestoreExecutionTraceArtifact(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    rpc PurgeExecutionTraceArtifact(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // UniversalDebugBus
    // =========================================

    // Tenant-scoped negative-experience evidence only. Occurrences/cases are
    // separate from Execution Trace; no generic event API is introduced.
    // Request payload: {occurrence: FaultOccurrence}; response: {case: DebugCase}.
    rpc ReportFaultOccurrence(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    // Request payload: {attempt: MitigationAttempt}; response: {case: DebugCase}.
    rpc ReportMitigationAttempt(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    // Request payload: {evidence: RecoveryEvidence}; response: {case: DebugCase}.
    rpc ReportRecoveryEvidence(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    // Request payload: {case_id, expected_case_revision, resolution_id}; response: {case: DebugCase}.
    rpc ResolveDebugCase(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    // Request payload: {case_id, trigger_occurrence_id, expected_case_revision}; response: {case: DebugCase}.
    rpc ReopenDebugCase(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    // Request payload: {case_id, tenant_id?}; response: {case: DebugCase}.
    // Any tenant request is checked against verified caller authority.
    rpc GetDebugCase(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
    // Request payload: {query: DebugCaseQuery}; tenant comes only from verified context.
    // One {case: DebugCase} per bounded response.
    rpc QueryDebugCases(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);
    // Request payload: {query: DebugCaseQuery}; recurrence requires fault_count >= 2.
    // Tenant comes only from verified context; one {case: DebugCase} per response.
    rpc QueryRecurringFaults(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // =========================================
    // Blackboard Operations (Flat Memory)
    // =========================================

    // Write arbitrary data to the blackboard, return UUID
    // Request payload: {tenant_id, scope_path, content, metadata?, ttl_seconds?, created_by?}
    // Response payload: {id, scope_path, created_at}
    rpc WriteBlackboard(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Read one or more records by UUID(s) — STRICTLY BATCHED
    // Request payload: {ids: [UUID, ...]}
    // Response payload: {records: [{id, content, metadata, scope_path, created_at}]}
    rpc ReadBlackboard(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Prune expired Blackboard records for one tenant.
    // Request payload: {tenant_id}
    // Response payload: {deleted_count, tenant_id}
    rpc PruneExpiredBlackboard(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // BrainSynapse Operations (Flat Memory Phase B)
    // =========================================

    // Record a BrainSynapse learning trace.
    // Request payload: {tenant_id?, agent_id, action_type, action_data?, action_data_ref?,
    //   thought_trace_ref?, content_hash?, graph_name?, graph_run_id?, node_id?, node_name?,
    //   node_role?, scope_path?, context_summary?, client_id?, fault_class?, status?,
    //   q_action?, q_hypothesis?, q_relevance?, metadata?}
    // Response payload: {id, agent_id, action_type, node_role, status, q_action,
    //   q_hypothesis, q_relevance, q_composite, scope_path, metadata, created_at, updated_at}
    rpc RecordSynapse(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Query BrainSynapses, ranked by q_composite and bounded by limit.
    // Request payload: {tenant_id?, action_type?, agent_id?, node_role?, status?,
    //   scope_path?, min_q?, limit?}
    // Response payload stream: one ContextUnit per Synapse row, same shape as RecordSynapse's
    //   response plus {graph_name, graph_run_id, node_id, node_name, action_data,
    //   action_data_ref, context_summary, thought_trace_ref, content_hash, fault_class}
    rpc QuerySynapses(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // Update Q-values/fault/status on one tenant-owned Synapse after an outcome/review.
    // Request payload: {synapse_id, q_action?, q_hypothesis?, q_relevance?, fault_class?,
    //   status?, metadata_patch?}
    // Response payload: {id, q_action, q_hypothesis, q_relevance, q_composite, updated_at}
    rpc UpdateSynapseQ(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Store one immutable delayed outcome and let Brain resolve eligible learning.
    // Request: {observation: {trace_id, graph_run_id, verdict_digest,
    //   observation_kind, source_authority, source_ref, occurred_at, idempotency_key}}
    // Response: {observation_id, trace_id, graph_run_id, policy_version,
    //   decision, applied_synapse_ids}
    rpc ReportOutcomeObservation(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // DuckDB Operations
    // =========================================

    // Execute high-speed DuckDB string/fuzzy matching on Parquet files
    // Request payload: {tenant_id, unmatched_uri, canonical_uri}
    // Response payload: {duckdb_matches: [...], duckdb_leftovers_count: int}
    rpc MatchDuckDB(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // Admin RPCs (WS-8) — require admin:read
    // Cross-tenant observability owned by Brain.
    // Replaces View brain_db RLS bypass (S8).
    // =========================================

    // List all tenants the caller may administer.
    // Requires admin:read.
    // Token admin:all → all tenants; else intersection with allowed_tenants.
    // Request payload: {}
    // Response payload: {tenants: [{id, label?, trace_count?}]}
    rpc ListTenants(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Cross-tenant trace search.
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {tenant_id?, service?, agent_id?, status?, hours?, limit?, offset?}
    // Response payload: {traces: [...], total: int}
    rpc AdminSearchTraces(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get full details for a single trace (cross-tenant, admin-only).
    // Requires admin:read.
    // Request payload: {trace_id}
    // Response payload: same shape as GetTraces row
    rpc AdminGetTraceDetails(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Cross-tenant system analytics aggregates.
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {hours?, tenant_id?}
    // Response payload: {analytics: {...}}
    rpc AdminGetSystemAnalytics(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

  // Cross-tenant Conversation History, BrainCell, and embedding-job counts.
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {layer?, tenant_id?}
    // Response payload: {layer_stats: {...}}
    rpc AdminGetMemoryLayerStats(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Distinct filter values from execution traces (for admin UI dropdowns).
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {tenant_id?}
    // Response payload: {filter_options: {agent_ids, tenant_ids, graph_names, user_ids}}
    rpc AdminGetFilterOptions(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Fetch all traces for a given session_id (cross-tenant, admin-only).
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {session_id, tenant_id?}
    // Response payload: {traces: [...]}
    rpc AdminGetSessionTraces(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);


    // List cells with optional tenant/kind filter (cross-tenant).
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {tenant_id?, kind?, limit?}
    // Response payload: {nodes: [...]}
    rpc AdminGetCells(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Rich analytics summary with per-hour breakdown, token costs, tool usage.
    // Requires admin:read.
    // tenant_id is optional only when token has admin:all; otherwise required.
    // Request payload: {tenant_id?, hours?}
    // Response payload: {analytics: {...}}
    rpc AdminGetAnalyticsSummary(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
}
