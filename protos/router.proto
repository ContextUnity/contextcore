syntax = "proto3";

package contextunity.router;

import "contextunit.proto";

// =====================================================
// Router Service - AI Agent Orchestration
// =====================================================
// All methods use ContextUnit as input/output.
// Agent identification and input is passed via payload.
// =====================================================

service RouterService {
    // Execute a single turn of an agent
    // Request payload: {agent_id, input, config?}
    // Tenant/user identity is derived from ContextToken (SPOT).
    // Response payload: {output, wall_ms?, langfuse_trace_id?, langfuse_trace_url?}
    rpc ExecuteAgent(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Stream agent execution (for UI with real-time output)
    // Request payload: {agent_id, input, config?}
    // Tenant/user identity is derived from ContextToken (SPOT).
    // Response payload: streaming ContextUnit events (progress/result/etc.)
    rpc StreamAgent(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // =========================================
    // Dispatcher Agent - Always-Active Agent
    // =========================================

    // Execute dispatcher agent (always-active agent with all tools)
    // Request payload: {messages: [{role, content}], session_id?, platform?, max_iterations?}
    // Tenant/user identity is derived from ContextToken (SPOT).
    // Response payload: {messages: [...], session_id, metadata: {...}}
    // Security: Uses SecurityScopes from ContextUnit for access control
    rpc ExecuteDispatcher(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Stream dispatcher agent execution
    // Request payload: {messages: [{role, content}], session_id?, platform?, max_iterations?}
    // Tenant/user identity is derived from ContextToken (SPOT).
    // Response payload: {event_type, data: {...}} (streaming events)
    // Security: Uses SecurityScopes from ContextUnit for access control
    rpc StreamDispatcher(contextunity.core.ContextUnit) returns (stream contextunity.core.ContextUnit);

    // =========================================
    // Project Tool & Graph Registration
    // =========================================

    // Deregister project tools and graph (on shutdown).
    // Request payload: {project_id: "contextmed"}
    // Response payload: {deregistered: [...], status: "ok"}

    // =========================================
    // Dynamic Project Manifest Registration
    // =========================================

    // Register an entire ContextUnity project manifest at once via dynamic gRPC push.
    // Replaces RegisterTools by acting on the Canonical Project Manifest directly.
    //
    // Security: Requires "tools:register" write scope in ContextUnit.
    //
    // Request payload: {
    //   bundle: {... compiled dictionary from ArtifactGenerator ...},
    //   hash: "a1b2c3d4..." // Optional: Used for idempotent validation against Redis cache
    // }
    //
    // Response payload: {registered_tools: [...], graph: "contextmed", status: "ok", hash_matched: true/false}
    rpc RegisterManifest(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // Tool Executor Stream (Bidi Callback)
    // =========================================

    // Bidirectional stream for project-side tool execution.
    // Project connects once and acts as remote executor for its tools.
    // Uses existing gRPC connection — no new ports needed.
    //
    // Flow:
    // 1. Project → Router: {"action": "ready", "project_id": "nszu",
    //                        "tools": ["execute_medical_sql"]}
    // 2. Router → Project: {"action": "execute", "tool": "execute_medical_sql",
    //                        "request_id": "abc", "args": {"sql": "SELECT ..."}}
    // 3. Project → Router: {"action": "result", "request_id": "abc",
    //                        "columns": [...], "rows": [...], "row_count": N}
    // 4. On error:
    //    Project → Router: {"action": "error", "request_id": "abc",
    //                        "error": "timeout"}
    //
    // Security: Requires ContextToken with "tools:register" permission.
    rpc ToolExecutorStream(stream contextunity.core.ContextUnit)
        returns (stream contextunity.core.ContextUnit);

    // =========================================
    // Graph Compiler — Node Execution (Phase 2)
    // =========================================

    // Execute a single compiled graph node by name.
    // Enables Worker workflows to invoke Router nodes directly
    // (e.g., synthesis workflow calling an LLM node for fact extraction).
    //
    // Request payload: {
    //   graph_name: string,         // Compiled graph identifier
    //   node_name: string,          // Node to execute within the graph
    //   state: {key: value, ...},   // Node input state
    //   config_overrides?: {...}    // Optional per-call config
    // }
    // Tenant/user identity is derived from ContextToken (SPOT).
    //
    // Response payload: {
    //   output: {key: value, ...},  // Node execution output
    //   node_name: string,
    //   execution_ms: int
    // }
    //
    // Security: Requires ContextToken with "router:execute_node" permission.
    rpc ExecuteNode(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // Introspection — Registered Manifest Query
    // =========================================

    // Inspect registered project manifests (sanitized, read-only).
    // Used by TUI, admin dashboards, and observability tooling.
    //
    // Request payload: {
    //   project_id?: string  // Optional — omit to list all visible projects
    // }
    //
    // Response payload: {
    //   projects: [{
    //     project_id, owner_tenant, security_mode,
    //     services, tools, graphs, policy
    //   }]
    // }
    //
    // Secrets are NEVER included in the response (sanitized server-side).
    // Security: Requires "router:introspect" permission.
    // In CU_LOCAL_MODE, HMAC tokens are accepted even when Shield is primary.
    rpc IntrospectRegistrations(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
}
