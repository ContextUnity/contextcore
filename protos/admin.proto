syntax = "proto3";

package contextunity;

import "contextunit.proto";

// =====================================================
// Admin Service - System Administration & Monitoring
// =====================================================
// All methods use ContextUnit as input/output.
// Domain-specific data is passed via payload field.
// =====================================================

service AdminService {
    // =========================================
    // Service Health
    // =========================================

    // Get health status of all services
    // Request payload: {}
    // Response payload: {services: {...}, timestamp: "..."}
    rpc GetServiceHealth(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get detailed metrics for a specific service
    // Request payload: {service_endpoint: "..."}
    // Response payload: {metrics: {...}}
    rpc GetServiceMetrics(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Test connectivity to a service
    // Request payload: {service_endpoint: "..."}
    // Response payload: {connected: bool, latency_ms: float}
    rpc CheckServiceConnectivity(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // Memory Statistics
    // =========================================

    // Get statistics for all memory layers
    // Request payload: {tenant_id?: "..."}
    // Response payload: {memory_layers: {...}}
    rpc GetMemoryStats(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get statistics for a specific memory layer
    // Request payload: {layer: "...", tenant_id?: "..."}
    // Response payload: {layer_stats: {...}}
    rpc GetMemoryLayerStats(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // Agent Management
    // =========================================

    // List all registered agents
    // Request payload: {service?: "...", tenant_id?: "..."}
    // Response payload: {agents: [...], total: int}
    rpc ListAgents(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get configuration for a specific agent
    // Request payload: {agent_id: "..."}
    // Response payload: {agent: {...}}
    rpc GetAgentConfig(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Update permissions for an agent
    // Request payload: {agent_id: "...", permissions: [...]}
    // Response payload: {success: bool}
    rpc UpdateAgentPermissions(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Update allowed/denied tools for an agent
    // Request payload: {agent_id: "...", allowed_tools: [...], denied_tools: [...]}
    // Response payload: {success: bool}
    rpc UpdateAgentTools(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get activity log for an agent
    // Request payload: {agent_id: "...", hours?: int}
    // Response payload: {activity: {...}}
    rpc GetAgentActivity(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // Trace Management
    // =========================================

    // Get full trace details
    // Request payload: {trace_id: "..."}
    // Response payload: {trace_id: "...", events: [...], services: [...], duration_ms: int, status: "..."}
    rpc GetTraceDetails(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Search traces by criteria
    // Request payload: {service?: "...", agent_id?: "...", status?: "...", hours?: int}
    // Response payload: {traces: [...], total: int}
    rpc SearchTraces(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get chain of thought for a trace
    // Request payload: {trace_id: "..."}
    // Response payload: {chain_of_thought: "..."}
    rpc GetTraceChainOfThought(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // Analytics
    // =========================================

    // Get system-wide analytics
    // Request payload: {hours?: int}
    // Response payload: {analytics: {...}}
    rpc GetSystemAnalytics(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get error analytics
    // Request payload: {hours?: int}
    // Response payload: {errors: [...], total: int}
    rpc GetErrorAnalytics(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // =========================================
    // Self-Healing
    // =========================================

    // Detect system errors
    // Request payload: {error_id?: "..."}
    // Response payload: {errors: [...], total: int}
    rpc DetectSystemErrors(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Trigger self-healing workflow
    // Request payload: {error_id?: "..."}
    // Response payload: {healing_id: "...", status: "..."}
    rpc TriggerSelfHealing(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);

    // Get healing status
    // Request payload: {healing_id: "..."}
    // Response payload: {status: "...", progress: {...}}
    rpc GetHealingStatus(contextunity.core.ContextUnit) returns (contextunity.core.ContextUnit);
}
