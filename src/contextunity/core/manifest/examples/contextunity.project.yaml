apiVersion: contextunity/v1alpha8
kind: ContextUnityProject
project:
  id: my-project
  name: My Project
services:
  router:
    enabled: true
  brain:
    enabled: true
  shield:
    enabled: true
router:
  default_graph: my-project
  graph:
    my-project:
      nodes:
      - name: planner
        type: llm
        model: openai/gpt-5-mini
        model_secret_ref: MY_PLANNER_API_KEY
        prompt_ref: src/app/prompts.py::PLANNER_PROMPT
        pii_masking: true
      - name: tool_execution
        type: tool
        tool_binding: federated:my_sql_tool
      - name: research_agent
        type: agent
        model: openai/gpt-5-mini
        model_secret_ref: MY_AGENT_API_KEY
        prompt_ref: src/app/prompts.py::AGENT_PROMPT
        tools:
        - federated:my_sql_tool
        config:
          tool_choice: auto
          max_tool_calls: 5
      - name: verifier
        type: llm
        model: openai/gpt-5-mini
        model_secret_ref: MY_VERIFIER_API_KEY
        prompt_ref: src/app/prompts.py::VERIFIER_PROMPT
        pii_masking: true
      - name: visualizer
        type: llm
        model: openai/gpt-5-mini
        model_secret_ref: MY_VISUALIZER_API_KEY
        prompt_ref: src/app/prompts.py::VISUALIZER_PROMPT
        pii_masking: true
      edges:
      - from_node: planner
        to_node: tool_execution
      - from_node: tool_execution
        to_node: research_agent
      - from_node: research_agent
        to_node: verifier
      - from_node: verifier
        condition_key: status
        condition_map:
          success: visualizer
          retry: planner
      runtime:
        max_retries: 2
  config:
    policy:
      models:
        llm:
          default: openai/gpt-5-mini
          secret_ref: MY_DEFAULT_MODEL_KEY
observability:
  health_probe: true
  readiness_check_mode: stream
  expected_tools:
  - my_sql_tool
  tracing:
    transport: disabled
